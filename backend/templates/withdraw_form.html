<!doctype html>
<html lang="th">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>ฟอร์มเบิกงาน {{ header['เลขที่เอกสาร'] }}</title>
  <link rel="stylesheet" href="{{ url_for('static', filename='formstyle.css') }}">
</head>
<body>
  <header class="topbar">
    <div class="topbar-inner">
      <div class="topbar-brand">
        <span class="topbar-logo" aria-hidden="true">▤</span>
        <span>Work Recording</span>
      </div>
    </div>
  </header>
  <main class="page">
    <header class="page-header form-page-header">
      <div class="page-header-spacer" aria-hidden="true"></div>
      <div class="page-header-title">
        <p class="eyebrow">Document Preview</p>
        <h1>ฟอร์มบันทึกการเบิกงาน ลำดับ {{ header['id'] }}</h1>
      </div>
      <div class="page-header-action">
        <a class="secondary-button" href="{{ url_for('withdraw_index') }}">กลับหน้ารายการ</a>
      </div>
    </header>

    <form class="edit-form official-form" action="{{ url_for('preview_pdf') }}" method="post" target="_blank" id="withdraw-form">
      <section class="form-section" aria-label="ข้อมูลการเบิกงาน">
        <h2 class="section-title">ข้อมูลการเบิกงาน</h2>
        <div class="form-grid">
          <label>
            <span>วันที่เบิกงาน</span>
            <input type="date" name="withdraw_date" value="{{ header['วันที่เบิกงาน'] }}" data-date-no-future readonly>
          </label>
          <label>
            <span>เลขที่เอกสาร (เบิก)</span>
            <input type="text" name="doc_no" value="{{ header['เลขที่เอกสาร'] }}" readonly>
          </label>
          <label>
            <span>รหัสงบประมาณ</span>
            <input type="text" name="budget_code" value="{{ header['รหัสงบประมาณ'] }}" readonly>
          </label>
          <label>
            <span>รหัสบัญชี</span>
            <input type="text" name="account_code" value="{{ header['รหัสบัญชี'] }}" readonly>
          </label>
          <label>
            <span>Lot no.</span>
            <input type="text" name="lot_no" value="{{ header['Lot no.'] }}" readonly>
          </label>
          <label>
            <span>ผู้เบิก</span>
            <input type="text" name="withdrawer" value="{{ header['ผู้เบิก'] }}" readonly>
          </label>
        </div>
      </section>

      <section class="form-section form-items" aria-label="รายการที่เบิก">
        <h2 class="section-title">รายการที่เบิก</h2>
        <div class="table-wrap">
          <table class="data-table edit-table">
            <thead>
              <tr>
                <th>รหัสบล็อกแก้ว</th>
                <th>รายการ</th>
                <th class="number">จำนวนที่เบิก</th>
              </tr>
            </thead>
            <tbody>
              {% for item in items %}
                <tr>
                  <td>
                    <input type="text" name="item_code[]" value="{{ item['รหัสบล็อกแก้ว'] }}" readonly>
                  </td>
                  <td>
                    <input type="text" name="item_name[]" value="{{ item['รายการ'] }}" readonly>
                  </td>
                  <td>
                    <input class="number-input" type="text" name="item_qty[]" value="{{ item['จำนวนที่เบิก'] }}" readonly>
                  </td>
                </tr>
              {% endfor %}
            </tbody>
          </table>
        </div>
      </section>

      <div class="actions">
        <button class="primary-button" type="submit" data-preview="true">Preview PDF</button>
      </div>
    </form>
  </main>

  <script>
    function normalizeInputDate(value) {
      const text = (value || "").trim();
      const isoDate = text.match(/^(\d{4})-(\d{1,2})-(\d{1,2})$/);
      if (isoDate) {
        return [
          isoDate[1],
          isoDate[2].padStart(2, "0"),
          isoDate[3].padStart(2, "0")
        ].join("-");
      }

      const slashDate = text.match(/^(\d{1,2})\/(\d{1,2})\/(\d{4})$/);
      if (slashDate) {
        return [
          slashDate[3],
          slashDate[1].padStart(2, "0"),
          slashDate[2].padStart(2, "0")
        ].join("-");
      }

      return text;
    }

    document.querySelectorAll("[data-date-no-future]").forEach(function (input) {
      const now = new Date();
      const today = [
        now.getFullYear(),
        String(now.getMonth() + 1).padStart(2, "0"),
        String(now.getDate()).padStart(2, "0")
      ].join("-");
      input.max = today;
      input.value = normalizeInputDate(input.value || input.getAttribute("value"));
      input.addEventListener("input", function () {
        if (input.value && input.value > today) {
          input.value = today;
        }
      });
    });

    document.getElementById("withdraw-form").addEventListener("submit", function (event) {
      if (!event.submitter || !event.submitter.dataset.preview) {
        return;
      }
      const docNo = this.elements.doc_no.value.trim() || "preview";
      this.action = "/withdraw/preview_pdf/" + encodeURIComponent(docNo);
    });
  </script>
</body>
</html>
